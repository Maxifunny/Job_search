services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: jobsearch
      POSTGRES_PASSWORD: jobsearch
      POSTGRES_DB: job_search
    ports:
      - "5432:5432"
    volumes:
      - job_search_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobsearch -d job_search"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  job_search_pgdata:
